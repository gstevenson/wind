<!doctype html>
<html class="no-js" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Aviation Wind Calculations</title>
        <link rel="stylesheet" href="css/style.css" />
        <meta name="description" content="" />

        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

        <meta property="og:title" content="" />
        <meta property="og:type" content="" />
        <meta property="og:url" content="" />
        <meta property="og:image" content="" />

        <link rel="icon" href="/favicon.ico?" sizes="any" />
        <link rel="icon" href="/icon.svg" type="image/svg+xml" />
        <link rel="apple-touch-icon" href="icon.png" />

        <link rel="manifest" href="site.webmanifest" />
        <meta name="theme-color" content="#fafafa" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;400;700;900&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
    </head>

    <body>
        <div class="container">
            <div class="header">
                <h1 class="roboto-black">Runway / Wind Calculator</h1>
            </div>
            <canvas id="myCanvas" role="img" aria-label="Wind rose showing runways and current wind direction"> Your browser does not support the canvas element. </canvas>

            <div class="controls-container">
                <label for="windInput">Wind Direction</label>

                <div class="number-input stepper">
                    <button class="btn-stepper" aria-label="Decrease wind direction by 10 degrees" onclick="window.adjustWindDirection(-10)">−</button>
                    <input type="number" id="windInput" name="windInput" min="0" max="359" value="180" inputmode="numeric" oninput="window.updateWindLine()" />
                    <button class="btn-stepper" aria-label="Increase wind direction by 10 degrees" onclick="window.adjustWindDirection(10)">+</button>
                </div>

                <label for="windSpeed">Wind Speed</label>

                <div class="number-input stepper">
                    <button class="btn-stepper" aria-label="Decrease wind speed by 1 knot" onclick="window.adjustWindSpeed(-1)">−</button>
                    <input type="number" id="windSpeed" name="windSpeed" min="0" max="50" value="10" inputmode="numeric" oninput="window.updateWindLine()" />
                    <button class="btn-stepper" aria-label="Increase wind speed by 1 knot" onclick="window.adjustWindSpeed(1)">+</button>
                </div>

                <p id="idealRunway" aria-live="polite" aria-atomic="true">Ideal runway: <span id="idealRunwayValue"></span></p>
                <p id="headWind" aria-live="polite" aria-atomic="true"><span id="headWindValue"></span></p>
                <p id="crossWind" aria-live="polite" aria-atomic="true"><span id="crossWindValue"></span></p>

                <div class="action-buttons">
                    <button class="btn btn-secondary" onclick="window.reconfigureRunways()">Reconfigure runways</button>
                    <button class="btn btn-secondary" onclick="window.reset()">Reset</button>
                </div>
            </div>

            <script src="js/app.js"></script>
        </div>
    </body>
</html>
